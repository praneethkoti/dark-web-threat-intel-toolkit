# =============================================================================
# Threat Keyword Dictionaries — Weighted Scoring
# =============================================================================
# Each category has a list of keywords with associated weights.
# Higher weight = stronger signal for that category.
# Weights: 1.0 = weak signal, 2.0 = moderate, 3.0 = strong indicator.
# =============================================================================

