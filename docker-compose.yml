services:
  dashboard:
    build: .
    image: dark-web-threat-intel-toolkit:latest
    container_name: threat-intel-dashboard
    ports:
      - "8501:8501"
    volumes:
      # Persist SQLite database and generated outputs outside the container
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      # Override API keys via .env file or environment — never commit secrets
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
