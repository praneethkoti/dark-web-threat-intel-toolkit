# =============================================================================
# MITRE ATT&CK Technique Mapping
# =============================================================================
# Maps each threat classification category to the most relevant ATT&CK
# techniques.  Used by classifier/mitre_mapper.py to enrich classified posts.
#
# Reference: https://attack.mitre.org/techniques/enterprise/
# =============================================================================

categories:

